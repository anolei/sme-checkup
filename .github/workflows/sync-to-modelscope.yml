name: Sync to ModelScope

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-to-modelscope-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MODELSCOPE_REPO: https://www.modelscope.cn/anolei/sme-checkup.git

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate configuration
        shell: bash
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${MODELSCOPE_TOKEN:-}" ]]; then
            echo "MODELSCOPE_TOKEN 鏈厤缃紝鏃犳硶鍚屾鍒伴瓟鎼€?
            exit 1
          fi

      - name: Show sync context
        shell: bash
        run: |
          set -euo pipefail
          echo "GitHub repository: $GITHUB_REPOSITORY"
          echo "GitHub ref: $GITHUB_REF"
          echo "Current commit: $(git rev-parse --short HEAD)"
          echo "Latest commit message:"
          git log -1 --pretty=%B

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify ModelScope remote access
        shell: bash
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::$MODELSCOPE_TOKEN"
          AUTHED_URL="https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/anolei/sme-checkup.git"
          if ! git ls-remote "$AUTHED_URL" >/dev/null 2>&1; then
            echo "鏃犳硶璁块棶榄旀惌浠撳簱锛岃妫€鏌ワ細"
            echo "1. 榄旀惌浠撳簱 anolei/sme-checkup 鏄惁宸插垱寤?
            echo "2. MODELSCOPE_TOKEN 鏄惁鏈夋晥涓斿叿澶囧啓鏉冮檺"
            echo "3. 浠撳簱鍦板潃鏄惁涓庡綋鍓嶅伐浣滄祦涓殑 MODELSCOPE_REPO 涓€鑷?
            exit 1
          fi

      - name: Push branch to ModelScope
        shell: bash
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::$MODELSCOPE_TOKEN"
          AUTHED_URL="https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/anolei/sme-checkup.git"
          git remote remove modelscope 2>/dev/null || true
          git remote add modelscope "$AUTHED_URL"

          if ! git push modelscope refs/heads/master:refs/heads/master --force; then
            echo "鍒嗘敮鍚屾澶辫触锛屽紑濮嬭緭鍑烘帓閿欎俊鎭€?
            echo "--- git remote -v (token 宸叉帺鐮? ---"
            git remote -v
            echo "--- git status --short ---"
            git status --short
            echo "--- branches ---"
            git branch -vv
            echo "--- last 5 commits ---"
            git log --oneline -5
            exit 1
          fi

          if ! git push modelscope --tags --force; then
            echo "鏍囩鍚屾澶辫触锛岃纭榄旀惌绔槸鍚﹀厑璁稿綋鍓嶅嚟璇佹帹閫佹爣绛俱€?
            exit 1
          fi

          git remote remove modelscope

      - name: Sync summary
        shell: bash
        run: |
          set -euo pipefail
          echo "宸插畬鎴?GitHub -> 榄旀惌闀滃儚鍚屾銆?
          echo "鐩爣浠撳簱: $MODELSCOPE_REPO"
          echo "鎻愪氦: $(git rev-parse --short HEAD)"
