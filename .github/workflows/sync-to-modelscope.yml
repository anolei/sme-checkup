name: Sync to ModelScope

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-to-modelscope-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MODELSCOPE_REPO: https://www.modelscope.cn/anolei/sme-checkup.git

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate configuration
        shell: bash
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${MODELSCOPE_TOKEN:-}" ]]; then
            echo "MODELSCOPE_TOKEN is empty."
            echo "Check GitHub repo Settings -> Secrets and variables -> Actions."
            echo "1. Secret name must be MODELSCOPE_TOKEN"
            echo "2. Secret value must be saved and non-empty"
            echo "3. If you just updated it, wait a few seconds and rerun the workflow"
            exit 1
          fi

          echo "MODELSCOPE_TOKEN is available to this workflow."



      - name: Show sync context
        shell: bash
        run: |
          set -euo pipefail
          echo "GitHub repository: $GITHUB_REPOSITORY"
          echo "GitHub ref: $GITHUB_REF"
          echo "Current commit: $(git rev-parse --short HEAD)"
          echo "Latest commit message:"
          git log -1 --pretty=%B

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify ModelScope remote access
        shell: bash
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::$MODELSCOPE_TOKEN"
          AUTHED_URL="https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/anolei/sme-checkup.git"
          if ! git ls-remote "$AUTHED_URL" >/dev/null 2>&1; then
            echo "Cannot access the ModelScope repository."
            echo "1. Confirm anolei/sme-checkup already exists on ModelScope"
            echo "2. Confirm MODELSCOPE_TOKEN is valid and has write access"
            echo "3. Confirm the repository URL matches MODELSCOPE_REPO"
            exit 1
          fi

          echo "ModelScope remote is reachable."


      - name: Push branch to ModelScope
        shell: bash
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::$MODELSCOPE_TOKEN"
          AUTHED_URL="https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/anolei/sme-checkup.git"
          git remote remove modelscope 2>/dev/null || true
          git remote add modelscope "$AUTHED_URL"

          if ! git push modelscope refs/heads/master:refs/heads/master --force; then
            echo "Branch sync failed. Dumping diagnostics."
            echo "This workflow assumes ModelScope is a dedicated mirror target."
            echo "If ModelScope auto-created a system commit, force push is required to replace it."
            echo "If force push is rejected, check branch protection or token write permission."
            echo "--- git remote -v (token masked) ---"
            git remote -v
            echo "--- git status --short ---"
            git status --short
            echo "--- branches ---"
            git branch -vv
            echo "--- last 5 commits ---"
            git log --oneline -5
            exit 1
          fi

          if ! git push modelscope --tags --force; then
            echo "Tag sync failed. Confirm the token can push tags on ModelScope."
            exit 1
          fi



          git remote remove modelscope


      - name: Sync summary
        shell: bash
        run: |
          set -euo pipefail
          echo "GitHub -> ModelScope mirror sync completed."
          echo "Target repository: $MODELSCOPE_REPO"
          echo "Commit: $(git rev-parse --short HEAD)"

